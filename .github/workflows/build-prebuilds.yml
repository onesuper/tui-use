name: Build Prebuilds

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [x64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          architecture: ${{ matrix.arch == 'arm64' && 'arm64' || 'x64' }}
      - name: Install dependencies
        run: npm ci
      - name: Build node-pty
        run: npm rebuild node-pty
      - name: Upload prebuild
        uses: actions/upload-artifact@v4
        with:
          name: prebuild-darwin-${{ matrix.arch }}
          path: node_modules/node-pty/build/Release/*.node

  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Install cross-compilation tools for ARM64
        if: matrix.arch == 'arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          export CC=aarch64-linux-gnu-gcc
          export CXX=aarch64-linux-gnu-g++
      - name: Build node-pty
        run: npm rebuild node-pty
        env:
          CC: ${{ matrix.arch == 'arm64' && 'aarch64-linux-gnu-gcc' || 'gcc' }}
          CXX: ${{ matrix.arch == 'arm64' && 'aarch64-linux-gnu-g++' || 'g++' }}
      - name: Upload prebuild
        uses: actions/upload-artifact@v4
        with:
          name: prebuild-linux-${{ matrix.arch }}
          path: node_modules/node-pty/build/Release/*.node

  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          architecture: ${{ matrix.arch }}
      - name: Install dependencies
        run: npm ci
      - name: Build node-pty
        run: npm rebuild node-pty
      - name: Upload prebuild
        uses: actions/upload-artifact@v4
        with:
          name: prebuild-win32-${{ matrix.arch }}
          path: node_modules/node-pty/build/Release/*.node

  package-and-publish:
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: Download all prebuilds
        uses: actions/download-artifact@v4
        with:
          path: prebuilds
          pattern: prebuild-*
      - name: Install dependencies
        run: npm ci
      - name: Build TypeScript
        run: npm run build
      - name: Copy prebuilds to package
        run: |
          mkdir -p dist/prebuilds
          for dir in prebuilds/prebuild-*/; do
            platform=$(basename "$dir" | sed 's/prebuild-//')
            mkdir -p "dist/prebuilds/$platform"
            cp "$dir"/*.node "dist/prebuilds/$platform/" 2>/dev/null || true
          done
          ls -la dist/prebuilds/
      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
